name: 📚 Archive Content

on:
  issues:
    types: [opened]

# 只处理带有 "archive" 标签的 Issue，或者 Issue 标题包含 URL
jobs:
  archive:
    runs-on: ubuntu-latest
    # 过滤：Issue body 里必须有 http
    if: contains(github.event.issue.body, 'http')

    permissions:
      contents: write
      issues: write

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install yt-dlp requests
          # 可选：安装 faster-whisper 用于视频转录（较慢，按需开启）
          # pip install faster-whisper

      - name: 🔍 Extract URL from Issue
        id: extract
        run: |
          BODY="${{ github.event.issue.body }}"
          # 提取第一个 URL
          URL=$(echo "$BODY" | grep -oP 'https?://[^\s\)\"]+' | head -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Extracted URL: $URL"

      - name: ⚙️ Process URL
        if: steps.extract.outputs.url != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TARGET_URL: ${{ steps.extract.outputs.url }}
        run: |
          python scripts/process_url.py "$TARGET_URL"

      - name: 💾 Commit & Push
        run: |
          git config user.name "Archive Bot"
          git config user.email "bot@archive.local"
          git add content/
          # 只有有变化才提交
          git diff --staged --quiet || git commit -m "📚 Archive $(date +%Y-%m-%d): ${{ github.event.issue.title }}"
          git push

      - name: ✅ Close Issue & Add Label
        uses: actions/github-script@v7
        with:
          script: |
            // 创建标签（如果不存在）
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'archived',
                color: '0075ca',
                description: '已归档'
              });
            } catch(e) {}

            // 关闭 Issue 并打标签
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['archived']
            });

            // 回复确认
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ **已成功归档！**\n\n内容已保存到 `content/` 目录，GitHub Pages 将自动更新。'
            });
